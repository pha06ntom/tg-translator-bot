services:
  postgres:
    image: postgres:16
    container_name: translator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tg_translator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translator_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro

volumes:
  postgres_data: